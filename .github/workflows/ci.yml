name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: TypeScript check
        run: npx tsc --noEmit
        continue-on-error: true

  notify-slack-pr:
    runs-on: ubuntu-latest
    needs: [check]
    if: github.event_name == 'pull_request'
    steps:
      - name: Get Vercel preview deployment
        id: vercel
        run: |
          sleep 45
          DEPLOY=$(curl -s "https://api.vercel.com/v6/deployments?projectId=${{ secrets.VERCEL_PROJECT_ID }}&limit=1" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            | jq -r '.deployments[0]')
          URL=$(echo $DEPLOY | jq -r '.url // empty')
          STATE=$(echo $DEPLOY | jq -r '.state // .readyState // empty')
          echo "url=${URL}" >> $GITHUB_OUTPUT
          echo "state=${STATE:-pending}" >> $GITHUB_OUTPUT

      - name: Notify Slack (staging)
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          BRANCH: ${{ github.head_ref }}
          PREVIEW_URL: ${{ steps.vercel.outputs.url }}
          DEPLOY_STATE: ${{ steps.vercel.outputs.state }}
        run: |
          PREVIEW=${PREVIEW_URL:-nexestate-gonzalos-projects-42c4ae43.vercel.app}
          curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d @- <<EOF
          {
            "channel": "C0AQW5NLG4Q",
            "unfurl_links": false,
            "text": "🔀 NexEstate PR #${PR_NUM}: ${PR_TITLE}",
            "blocks": [
              {
                "type": "header",
                "text": { "type": "plain_text", "text": "🔀 NexEstate — PR Preview" }
              },
              {
                "type": "section",
                "fields": [
                  { "type": "mrkdwn", "text": "*PR:*\n<${PR_URL}|#${PR_NUM} ${PR_TITLE}>" },
                  { "type": "mrkdwn", "text": "*Author:*\n${PR_AUTHOR}" },
                  { "type": "mrkdwn", "text": "*Branch:*\n${BRANCH}" },
                  { "type": "mrkdwn", "text": "*Status:*\n${DEPLOY_STATE}" }
                ]
              },
              {
                "type": "section",
                "text": { "type": "mrkdwn", "text": "🔍 <https://${PREVIEW}|Preview> · 📋 <https://vercel.com/gonzalos-projects-42c4ae43/nexestate|Vercel>" }
              }
            ]
          }
          EOF

  notify-slack-prod:
    runs-on: ubuntu-latest
    needs: [check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Get Vercel deployment
        id: vercel
        run: |
          sleep 45
          DEPLOY=$(curl -s "https://api.vercel.com/v6/deployments?projectId=${{ secrets.VERCEL_PROJECT_ID }}&limit=1&target=production" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            | jq -r '.deployments[0]')
          URL=$(echo $DEPLOY | jq -r '.url // empty')
          STATE=$(echo $DEPLOY | jq -r '.state // .readyState // empty')
          echo "url=${URL}" >> $GITHUB_OUTPUT
          echo "state=${STATE:-pending}" >> $GITHUB_OUTPUT

      - name: Notify Slack (production)
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          AUTHOR: ${{ github.actor }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          PREVIEW_URL: ${{ steps.vercel.outputs.url }}
          DEPLOY_STATE: ${{ steps.vercel.outputs.state }}
        run: |
          PREVIEW=${PREVIEW_URL:-nexestate-gonzalos-projects-42c4ae43.vercel.app}
          SHORT_SHA=${COMMIT_SHA:0:7}
          MSG=$(echo "$COMMIT_MSG" | head -1)
          curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d @- <<EOF
          {
            "channel": "C0APVFPV7C3",
            "unfurl_links": false,
            "text": "🚀 NexEstate deployed to production: ${MSG}",
            "blocks": [
              {
                "type": "header",
                "text": { "type": "plain_text", "text": "🚀 NexEstate — Production Deploy" }
              },
              {
                "type": "section",
                "fields": [
                  { "type": "mrkdwn", "text": "*Commit:*\n<${COMMIT_URL}|${SHORT_SHA}>" },
                  { "type": "mrkdwn", "text": "*Author:*\n${AUTHOR}" },
                  { "type": "mrkdwn", "text": "*Status:*\n${DEPLOY_STATE}" },
                  { "type": "mrkdwn", "text": "*Message:*\n${MSG}" }
                ]
              },
              {
                "type": "section",
                "text": { "type": "mrkdwn", "text": "🌐 <https://nexestate.skyw.dev|Production> · 🔍 <https://${PREVIEW}|Preview> · 📋 <https://vercel.com/gonzalos-projects-42c4ae43/nexestate|Vercel>" }
              }
            ]
          }
          EOF
